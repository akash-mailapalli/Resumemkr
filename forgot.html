<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - ResumeMkr</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./auth.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 selection:bg-indigo-500 selection:text-white">

  <div class="auth-container">
    <div class="auth-card">
      <div class="text-center space-y-3 mb-8">
        <a href="index.html" class="inline-flex items-center gap-2">
          <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">R</div>
          <span class="text-2xl font-display font-extrabold tracking-tight text-slate-900">ResumeMkr</span>
        </a>
        <h2 class="text-xl font-bold text-slate-800">Reset Password</h2>
        <p class="text-xs text-slate-500">Enter your email and we will send you instructions to reset your password.</p>
      </div>

      <!-- General Alert Message -->
      <div id="alert" class="hidden mb-4 p-4 text-xs rounded-xl flex items-start gap-2.5">
        <div id="alert-icon-container">
          <i data-lucide="alert-circle" class="w-4.5 h-4.5 shrink-0"></i>
        </div>
        <span id="alert-message"></span>
      </div>

      <form id="forgot-form" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">Email Address</label>
          <input type="email" id="email" required placeholder="name@example.com" class="auth-input">
        </div>

        <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold transition-all shadow-md shadow-indigo-100 flex items-center justify-center gap-2 btn-ripple">
          Send Instructions <i data-lucide="send" class="w-4 h-4"></i>
        </button>
      </form>

      <div class="text-center mt-8 pt-4 border-t border-slate-100">
        <span class="text-xs text-slate-500">Remembered password? </span>
        <a href="login.html" class="text-xs font-semibold text-indigo-600 hover:text-indigo-700">Back to Login</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { resetPassword } from "./auth.js";

    const forgotForm = document.getElementById("forgot-form");
    const emailInput = document.getElementById("email");
    const alertBox = document.getElementById("alert");
    const alertIconContainer = document.getElementById("alert-icon-container");
    const alertMessage = document.getElementById("alert-message");

    function showAlert(text, isSuccess = false) {
      alertMessage.textContent = text;
      if (isSuccess) {
        alertBox.className = "mb-4 p-4 bg-emerald-50 border border-emerald-100 text-emerald-700 text-xs rounded-xl flex items-start gap-2.5";
        alertIconContainer.innerHTML = `<i data-lucide="check-circle" class="w-4.5 h-4.5 text-emerald-500 shrink-0"></i>`;
      } else {
        alertBox.className = "mb-4 p-4 bg-rose-50 border border-rose-100 text-rose-700 text-xs rounded-xl flex items-start gap-2.5";
        alertIconContainer.innerHTML = `<i data-lucide="alert-circle" class="w-4.5 h-4.5 text-rose-500 shrink-0"></i>`;
      }
      alertBox.classList.remove("hidden");
      lucide.createIcons();
    }

    forgotForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      alertBox.classList.add("hidden");

      try {
        await resetPassword(emailInput.value);
        showAlert("Reset email sent! Please check your spam folder if it doesn't arrive within 2 minutes.", true);
      } catch (err) {
        showAlert(err.message || "Failed to submit reset request. Please confirm the email is correct.");
      }
    });

    lucide.createIcons();
  </script>
</body>
</html>
