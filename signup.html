<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - ResumeMkr</title>
  <link class="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./auth.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 selection:bg-indigo-500 selection:text-white">

  <div class="auth-container">
    <div class="auth-card">
      <div class="text-center space-y-3 mb-8">
        <a href="index.html" class="inline-flex items-center gap-2">
          <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">R</div>
          <span class="text-2xl font-display font-extrabold tracking-tight text-slate-900">ResumeMkr</span>
        </a>
        <h2 class="text-xl font-bold text-slate-800">Create Account</h2>
        <p class="text-xs text-slate-500">Sign up and start building beautiful resumes free forever.</p>
      </div>

      <!-- General Alert Message -->
      <div id="error-alert" class="hidden mb-4 p-4 bg-rose-50 border border-rose-100 text-rose-700 text-xs rounded-xl flex items-start gap-2.5">
        <i data-lucide="alert-circle" class="w-4.5 h-4.5 text-rose-500 shrink-0"></i>
        <span id="error-message"></span>
      </div>

      <form id="signup-form" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">Full Name</label>
          <input type="text" id="fullname" required placeholder="Alex Rivera" class="auth-input">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">Email Address</label>
          <input type="email" id="email" required placeholder="name@example.com" class="auth-input">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">Password</label>
          <input type="password" id="password" required placeholder="••••••••" class="auth-input">
        </div>

        <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold transition-all shadow-md shadow-indigo-100 flex items-center justify-center gap-2 btn-ripple">
          Register Account <i data-lucide="user-plus" class="w-4 h-4"></i>
        </button>
      </form>

      <div class="relative my-6 flex items-center justify-center">
        <div class="absolute inset-0 bg-slate-200 h-[1px]"></div>
        <span class="relative bg-white px-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Or sign up with</span>
      </div>

      <!-- Social Provider Button -->
      <button id="google-login-btn" class="social-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5" alt="Google Logo">
        Sign up with Google
      </button>

      <div class="text-center mt-8 pt-4 border-t border-slate-100">
        <span class="text-xs text-slate-500">Already have an account? </span>
        <a href="login.html" class="text-xs font-semibold text-indigo-600 hover:text-indigo-700">Login here</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initAuthProtection, registerWithEmail, loginWithGoogle } from "./auth.js";

    // Initialize Route guards
    initAuthProtection(false);

    const signupForm = document.getElementById("signup-form");
    const fullnameInput = document.getElementById("fullname");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const errorAlert = document.getElementById("error-alert");
    const errorMessage = document.getElementById("error-message");
    const googleLoginBtn = document.getElementById("google-login-btn");

    function showAlert(text) {
      errorMessage.textContent = text;
      errorAlert.classList.remove("hidden");
    }

    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorAlert.classList.add("hidden");

      if (passwordInput.value.length < 6) {
        showAlert("Password must be at least 6 characters long.");
        return;
      }

      try {
        const user = await registerWithEmail(emailInput.value, passwordInput.value, fullnameInput.value);
        if (user) {
          window.location.href = "dashboard.html";
        }
      } catch (err) {
        showAlert(err.message || "Failed to create account. Email may already be registered.");
      }
    });

    googleLoginBtn.addEventListener("click", async () => {
      errorAlert.classList.add("hidden");
      try {
        const user = await loginWithGoogle();
        if (user) {
          window.location.href = "dashboard.html";
        }
      } catch (err) {
        showAlert(err.message || "Google registration failed. Please try again.");
      }
    });

    lucide.createIcons();
  </script>
</body>
</html>
