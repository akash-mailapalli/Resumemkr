<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ResumeMkr</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./auth.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 selection:bg-indigo-500 selection:text-white">

  <div class="auth-container flex-col gap-4 py-8">
    <div class="auth-card">
      <div class="text-center space-y-3 mb-8">
        <a href="index.html" class="inline-flex items-center gap-2">
          <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">R</div>
          <span class="text-2xl font-display font-extrabold tracking-tight text-slate-900">ResumeMkr</span>
        </a>
        <h2 class="text-xl font-bold text-slate-800">Welcome Back</h2>
        <p class="text-xs text-slate-500">Sign in to continue managing and editing your resumes.</p>
      </div>

      <!-- General Alert Message -->
      <div id="error-alert" class="hidden mb-4 p-4 bg-rose-50 border border-rose-100 text-rose-700 text-xs rounded-xl flex items-start gap-2.5">
        <i data-lucide="alert-circle" class="w-4.5 h-4.5 text-rose-500 shrink-0"></i>
        <span id="error-message"></span>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">Email Address</label>
          <input type="email" id="email" required placeholder="name@example.com" class="auth-input">
        </div>
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Password</label>
            <a href="forgot.html" class="text-xs font-semibold text-indigo-600 hover:text-indigo-700">Forgot?</a>
          </div>
          <input type="password" id="password" required placeholder="••••••••" class="auth-input">
        </div>

        <div class="flex items-center justify-between pt-1">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="remember-me" class="w-4 h-4 rounded text-indigo-600 border-slate-300 focus:ring-indigo-500">
            <span class="text-xs font-semibold text-slate-600">Remember me</span>
          </label>
        </div>

        <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold transition-all shadow-md shadow-indigo-100 flex items-center justify-center gap-2 btn-ripple">
          Sign In <i data-lucide="log-in" class="w-4 h-4"></i>
        </button>
      </form>

      <div class="relative my-6 flex items-center justify-center">
        <div class="absolute inset-0 bg-slate-200 h-[1px]"></div>
        <span class="relative bg-white px-4 text-xs font-semibold text-slate-400 uppercase tracking-wider">Or continue with</span>
      </div>

      <!-- Social Provider Button -->
      <button id="google-login-btn" class="w-full py-2.5 border border-slate-200 hover:bg-slate-50 text-slate-700 rounded-xl text-sm font-semibold transition-all flex items-center justify-center gap-2 cursor-pointer shadow-sm">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5" alt="Google Logo">
        Sign in with Google
      </button>

      <div class="text-center mt-8 pt-4 border-t border-slate-100">
        <span class="text-xs text-slate-500">New to ResumeMkr? </span>
        <a href="signup.html" class="text-xs font-semibold text-indigo-600 hover:text-indigo-700">Create an Account</a>
      </div>
    </div>

    <!-- Firebase Connection Switcher Widget -->
    <div class="bg-white rounded-2xl max-w-[440px] w-full p-4 shadow-xl border border-slate-150/80 text-center space-y-3 relative z-10">
      <div class="flex items-center justify-center gap-1.5 text-slate-400">
        <i data-lucide="settings-2" class="w-4 h-4 text-indigo-500"></i>
        <span class="text-[10px] font-extrabold uppercase tracking-widest text-slate-400">Database Connection config</span>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <button id="provider-aistudio-btn" class="px-3 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1 cursor-pointer">
          <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
          AI Studio (Managed)
        </button>
        <button id="provider-custom-btn" class="px-3 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1 cursor-pointer">
          <i data-lucide="database" class="w-3.5 h-3.5"></i>
          Custom (ipl-game)
        </button>
      </div>
      <p id="provider-desc" class="text-[10px] text-slate-500 font-semibold leading-relaxed"></p>
    </div>
  </div>

  <script type="module">
    import { initAuthProtection, loginWithEmail, loginWithGoogle } from "./auth.js";
    import { activeProvider, switchFirebaseProvider } from "./firebase.js";

    // Initialize Route guards (Redirect to dashboard if already authenticated)
    initAuthProtection(false);

    const loginForm = document.getElementById("login-form");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const rememberMeCheck = document.getElementById("remember-me");
    const errorAlert = document.getElementById("error-alert");
    const errorMessage = document.getElementById("error-message");
    const googleLoginBtn = document.getElementById("google-login-btn");

    // Configure Firebase Provider Switcher
    const aiStudioBtn = document.getElementById("provider-aistudio-btn");
    const customBtn = document.getElementById("provider-custom-btn");
    const descText = document.getElementById("provider-desc");

    if (activeProvider === 'aistudio') {
      aiStudioBtn.className = "px-3 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1 bg-indigo-600 text-white shadow-md cursor-pointer";
      customBtn.className = "px-3 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1 bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-700 cursor-pointer";
      descText.textContent = "Using 100% pre-configured, fully active AI Studio Managed Firestore and Google Sign-In with zero setup required.";
    } else {
      aiStudioBtn.className = "px-3 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1 bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-700 cursor-pointer";
      customBtn.className = "px-3 py-2 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-1 bg-indigo-600 text-white shadow-md cursor-pointer";
      descText.textContent = "Using custom Firebase project ipl-game-b6c6a. Ensure Firestore is enabled & Auth providers are activated.";
    }

    aiStudioBtn.addEventListener("click", () => switchFirebaseProvider('aistudio'));
    customBtn.addEventListener("click", () => switchFirebaseProvider('custom'));

    function showAlert(text) {
      if (text.startsWith("UNAUTHORIZED_DOMAIN|")) {
        const parts = text.split("|");
        const host = parts[1] || window.location.hostname;
        const projectId = parts[2] || "ipl-game-b6c6a";
        const consoleUrl = `https://console.firebase.google.com/project/${projectId}/authentication/settings`;
        errorMessage.innerHTML = `
          <div class="space-y-3 w-full text-left">
            <p class="font-bold text-sm text-rose-800 flex items-center gap-1">
              <i data-lucide="shield-alert" class="w-4 h-4 text-rose-600 shrink-0"></i> 
              Authorized Domain Required
            </p>
            <p class="text-xs text-rose-700 leading-relaxed">This development or preview domain is not added to your Firebase project authorized domains list yet.</p>
            
            <div class="p-3 bg-white border border-rose-100 rounded-xl space-y-1.5 font-sans shadow-inner">
              <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Your Domain</p>
              <div class="flex items-center justify-between gap-2">
                <code class="text-[11px] font-mono select-all bg-slate-50 border border-slate-200 px-2 py-1 rounded text-indigo-600 truncate flex-1 font-bold">${host}</code>
                <button type="button" id="copy-host-btn" class="px-2.5 py-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-bold rounded-lg text-xs transition-all shrink-0 cursor-pointer">
                  Copy
                </button>
              </div>
            </div>

            <div class="space-y-2 pt-1 text-xs">
              <p class="font-bold text-rose-800">How to fix in 10 seconds:</p>
              <ol class="list-decimal list-inside space-y-1.5 text-[11px] text-rose-700">
                <li>Open your <a href="${consoleUrl}" target="_blank" class="font-bold text-indigo-600 underline hover:text-indigo-800 inline-flex items-center gap-0.5">Firebase Auth Settings <i data-lucide="external-link" class="w-3 h-3 inline"></i></a></li>
                <li>Under <strong>Authorized domains</strong>, click <strong>Add domain</strong></li>
                <li>Paste the copied domain above and click <strong>Add</strong></li>
              </ol>
            </div>
            
            <p class="text-[10px] text-rose-500 mt-2 font-medium">Alternatively, you can sign in instantly using your Email & Password!</p>
          </div>
        `;
        errorAlert.classList.remove("hidden");
        lucide.createIcons();
        
        // Add Copy button listener
        document.getElementById("copy-host-btn")?.addEventListener("click", () => {
          navigator.clipboard.writeText(host).then(() => {
            const btn = document.getElementById("copy-host-btn");
            if (btn) {
              btn.textContent = "Copied!";
              btn.classList.replace("bg-indigo-50", "bg-emerald-50");
              btn.classList.replace("text-indigo-600", "text-emerald-600");
              setTimeout(() => {
                btn.textContent = "Copy";
                btn.classList.replace("bg-emerald-50", "bg-indigo-50");
                btn.classList.replace("text-emerald-600", "text-indigo-600");
              }, 2000);
            }
          });
        });
      } else if (text.includes("operation-not-allowed") || text.includes("operation is not allowed") || text.includes("auth/operation-not-allowed")) {
        const projectId = "ipl-game-b6c6a";
        const providersUrl = `https://console.firebase.google.com/project/${projectId}/authentication/providers`;
        errorMessage.innerHTML = `
          <div class="space-y-3 w-full text-left">
            <p class="font-bold text-sm text-rose-800 flex items-center gap-1">
              <i data-lucide="shield-alert" class="w-4 h-4 text-rose-600 shrink-0"></i> 
              Email/Password Provider Disabled
            </p>
            <p class="text-xs text-rose-700 leading-relaxed">The <strong>Email/Password</strong> sign-in method is not enabled in your Firebase project <strong>${projectId}</strong>.</p>
            
            <div class="space-y-2 pt-1 text-xs">
              <p class="font-bold text-rose-800">How to fix in 15 seconds:</p>
              <ol class="list-decimal list-inside space-y-1.5 text-[11px] text-rose-700">
                <li>Go to the <a href="${providersUrl}" target="_blank" class="font-bold text-indigo-600 underline hover:text-indigo-800 inline-flex items-center gap-0.5">Firebase Auth Providers Console <i data-lucide="external-link" class="w-3 h-3 inline"></i></a></li>
                <li>Under <strong>Sign-in method</strong>, click <strong>Add new provider</strong> (or select <strong>Email/Password</strong> if visible)</li>
                <li>Toggle the <strong>Enable</strong> switch to ON</li>
                <li>Click <strong>Save</strong> and refresh this page to sign in!</li>
              </ol>
            </div>
          </div>
        `;
        errorAlert.classList.remove("hidden");
        lucide.createIcons();
      } else {
        errorMessage.textContent = text;
        errorAlert.classList.remove("hidden");
      }
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorAlert.classList.add("hidden");

      try {
        const user = await loginWithEmail(emailInput.value, passwordInput.value, rememberMeCheck.checked);
        if (user) {
          window.location.href = "dashboard.html";
        }
      } catch (err) {
        showAlert(err.message || "Invalid credentials. Please try again.");
      }
    });

    googleLoginBtn.addEventListener("click", async () => {
      errorAlert.classList.add("hidden");
      try {
        const user = await loginWithGoogle();
        if (user) {
          window.location.href = "dashboard.html";
        }
      } catch (err) {
        showAlert(err.message || "Google Authentication failed. Please try again.");
      }
    });

    lucide.createIcons();
  </script>
</body>
</html>
